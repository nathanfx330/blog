{{ define "main" }}
    <article class="post-content">
        <header>
            <h1>{{ .Title }}</h1>
            <div class="author-byline">By {{ .Params.author | default "Nathaniel Westveer" }}</div>
            <time>{{ .Date.Format "January 2, 2006" }}</time>
        </header>
        {{ .Content }}
    </article>
{{ end }}
